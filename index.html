<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #6d5dfc, #36c5f0);
    }

    h1 {
      margin: 0;
      padding: 32px 48px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 20px 50px rgba(26, 30, 72, 0.25);
      backdrop-filter: blur(12px);
      font-size: clamp(3rem, 10vw, 7rem);
      letter-spacing: -0.05em;
    }
  </style>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>
